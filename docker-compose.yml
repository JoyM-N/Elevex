services:

  mysql:
    image: mysql:8.0
    container_name: elevex_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: elevex
      MYSQL_USER: elevex_user
      MYSQL_PASSWORD: elevex_secret
    ports:
      - "3308:3306"
    volumes:
      - elevex_mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: elevex_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - elevex_redis_data:/data

volumes:
  elevex_mysql_data:
  elevex_redis_data: